name: maylo
description: "A Spotify like Flutter App"
publish_to: "none"

version: 1.0.12+3

environment:
  sdk: ">3.10.0 < 4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  flutter_riverpod:
  rxdart:

  # Audio
  just_audio:
  just_audio_background:
  audio_service:
  audio_session:

  # Storage
  hive:
  hive_flutter:
  shared_preferences:
  path:
  path_provider:

  # Network
  http:
  dio:
  html:
  html_unescape:

  # UI
  dynamic_color:
  palette_generator_master:
  flashy_tab_bar2:
  cached_network_image:
  shimmer:
  figma_squircle:
  marquee:
  page_transition: ^2.2.2
  readmore:
  flutter_swipe_action_cell:
  toastification:
  drag_and_drop_lists:

  # System
  app_links:
  share_plus:
  flutter_local_notifications:
  permission_handler:
  internet_connection_checker_plus:
  url_launcher:
  image_picker:
  disk_space_plus:
  package_info_plus:

  # Misc
  intl:
  dart_des:

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons:
  flutter_lints: ^5.0.0
  build_runner:

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: SpotifyMix
      fonts:
        - asset: assets/fonts/SpotifyMix-Thin.ttf
          weight: 100
        - asset: assets/fonts/SpotifyMix-ThinItalic.ttf
          weight: 100
          style: italic

        - asset: assets/fonts/SpotifyMix-Light.ttf
          weight: 300
        - asset: assets/fonts/SpotifyMix-LightItalic.ttf
          weight: 300
          style: italic

        - asset: assets/fonts/SpotifyMix-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpotifyMix-RegularItalic.ttf
          weight: 400
          style: italic

        - asset: assets/fonts/SpotifyMix-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpotifyMix-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/SpotifyMix-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpotifyMix-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: assets/fonts/SpotifyMix-Extrabold.ttf
          weight: 800
        - asset: assets/fonts/SpotifyMix-ExtraboldItalic.ttf
          weight: 800
          style: italic

        - asset: assets/fonts/SpotifyMix-Black.ttf
          weight: 900
        - asset: assets/fonts/SpotifyMix-BlackItalic.ttf
          weight: 900
          style: italic

        - asset: assets/fonts/SpotifyMix-Ultra.ttf
          weight: 900
        - asset: assets/fonts/SpotifyMix-UltraItalic.ttf
          weight: 900
          style: italic

flutter_launcher_icons:
  android: "launcher_icon"
  image_path_android: "assets/icons/logo.png"
  adaptive_icon_foreground: "assets/icons/radio.png"
  adaptive_icon_background: "#CC0000"
  adaptive_icon_monochrome: "assets/icons/radio.png"
  adaptive_icon_foreground_inset: 24
